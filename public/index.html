<!DOCTYPE html>
<html>
<head>
    <title>Sangram Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            display: inline-block;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #555;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome Sangram 🚀</h1>
        <p>This website is hosted on EC2 using Node.js</p>
        <button onclick="showMessage()">Click Me</button>
        <p id="msg"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML = "🔥 EC2 Deployment Successful!";
        }
    </script>

</body>
</html>
